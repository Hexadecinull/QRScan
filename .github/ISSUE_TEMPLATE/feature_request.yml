name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement to QRScan.

  - type: dropdown
    id: platform
    attributes:
      label: Target platform
      options:
        - Android (API 21+)
        - Android Legacy (API 7–20)
        - iOS / iPadOS
        - iPhoneOS Classic
        - BlackBerry OS
        - Samsung Bada
        - Symbian
        - postmarketOS
        - All platforms
        - New platform
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve, or what motivated this request?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see added.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative approaches?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have read CONTRIBUTING.md.
          required: true
